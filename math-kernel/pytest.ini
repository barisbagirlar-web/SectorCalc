[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --verbose --tb=short --strict-markers
markers =
    strict_bounds: marks test that verifies strict interval bound compliance
    hypothesis: marks property-based hypothesis test
    mms: marks Method of Manufactured Solutions test
    api: marks FastAPI integration test
filterwarnings =
    ignore::DeprecationWarning
