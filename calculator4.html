<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SectorCalc — SC-008 Tolerance Stack-Up</title>
    <link rel="stylesheet" href="/src/styles/workshop-theme.css" />
    <style>
      body { margin: 0; background: var(--sc-bg, #f5f6fa); color: var(--sc-steel, #2d3436); font-family: var(--sc-sans, system-ui); }
      .wrap { max-width: 1080px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      .card { background: #fff; border: 1px solid #dfe6e9; border-radius: 12px; padding: 20px; }
      h1 { font-size: 20px; grid-column: 1 / -1; margin: 0 0 4px; }
      .sub { grid-column: 1 / -1; color: var(--sc-muted, #636e72); margin: 0 0 8px; font-size: 14px; }
      @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>SC-008 — Statistical Tolerance Stack-Up</h1>
      <p class="sub">Worst-case, RSS and deterministic Monte Carlo — will the stack hold the spec?</p>
      <div class="card"><sc-stack-editor id="editor"></sc-stack-editor></div>
      <div class="card">
        <sc-stack-result id="result"></sc-stack-result>
        <sc-warning-panel id="warnings"></sc-warning-panel>
        <sc-stack-chart id="gauge" kind="gauge" title="Cpk"></sc-stack-chart>
        <sc-stack-chart id="trend" kind="trend" title="Cpk vs tolerance scale"></sc-stack-chart>
        <sc-stack-chart id="hist" kind="histogram" title="Monte Carlo distribution"></sc-stack-chart>
        <sc-stack-chart id="pareto" kind="pareto" title="Contribution pareto"></sc-stack-chart>
        <sc-stack-chart id="compare" kind="compare" title="Method comparison (+/- spread)"></sc-stack-chart>
        <sc-stack-pdf id="pdf"></sc-stack-pdf>
      </div>
    </div>
    <script type="module" src="/src/calculator4.ts"></script>
  </body>
</html>
