<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — SectorCalc</title>
    <link rel="icon" href="/img/brand/sectorcalc-favicon-32.png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #faf7f2;
        color: #1f2430;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: #fff;
        border: 1px solid rgba(31, 36, 48, 0.12);
        border-radius: 16px;
        padding: 28px 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(31, 36, 48, 0.08);
      }
      img { width: 48px; height: 48px; }
      h1 { font-size: 1.25rem; margin: 16px 0 8px; }
      p { font-size: 0.95rem; line-height: 1.5; color: #4a5160; margin: 0 0 8px; }
      .note { font-size: 0.8rem; color: #6b7280; margin-top: 16px; }
      button {
        margin-top: 18px;
        min-height: 44px;
        padding: 0 20px;
        border: none;
        border-radius: 10px;
        background: #c2410c;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card" data-offline-shell="true">
      <img src="/img/brand/sectorcalc-favicon-180.png" alt="SectorCalc" />
      <h1>You are offline</h1>
      <p>This page needs a connection. The cached shell is shown for navigation only.</p>
      <p class="note">
        Live calculations, verified reports and saved results require a connection. Any cached
        content may be out of date — do not rely on it for decisions.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
