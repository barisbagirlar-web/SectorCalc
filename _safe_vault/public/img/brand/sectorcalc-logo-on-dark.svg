<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 280 72"
  width="280"
  height="72"
  role="img"
  aria-label="SectorCalc"
>
  <title>SectorCalc</title>

  <!-- 4 squares in blue tones (2x2 grid) -->
  <rect x="10" y="20" width="18" height="18" rx="2" fill="#A0C4E8"/>
  <rect x="31" y="20" width="18" height="18" rx="2" fill="#4A90D9"/>
  <rect x="10" y="41" width="18" height="18" rx="2" fill="#2B6CB0"/>
  <rect x="31" y="41" width="18" height="18" rx="2" fill="#0F2B5C"/>

  <!-- Text: Sector (white) + Calc (light blue) for dark backgrounds -->
  <text
    x="65" y="49"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="26"
    font-weight="600"
    letter-spacing="-0.03"
    fill="#FFFFFF"
  >Sector</text>
  <text
    x="168" y="49"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="26"
    font-weight="600"
    letter-spacing="-0.03"
    fill="#6B8AFF"
  >Calc</text>
</svg>
