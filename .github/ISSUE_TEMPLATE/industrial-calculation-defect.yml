name: Industrial calculation defect
description: Report a schema, unit, formula, result, decision-state, or PDF evidence defect.
title: "[CALC] "
labels: [calculation, needs-triage]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Defect surface
      options:
        - Tool identity / wrong form
        - Input validation
        - Unit conversion
        - Formula / calculation engine
        - Result rendering
        - Decision state
        - Authentication / Pro session
        - PDF / print evidence
        - Cross-tool contamination
    validations:
      required: true
  - type: input
    id: tool
    attributes:
      label: Tool slug
      placeholder: break-even-survival-cash-calculator
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: Exact inputs and units
      description: Include display values and selected units. Do not include credentials or customer data.
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Independently expected result
      description: State the formula/source and acceptable absolute or relative tolerance.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result and decision state
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Runtime evidence
      description: Browser console/network status, API response shape, screenshot, report ID, or PDF hash. Redact secrets.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Reproduction coverage
      options:
        - label: Nominal case reproduced
        - label: Boundary or zero case checked
        - label: Unit/display conversion checked
        - label: Same-session cross-tool navigation checked
        - label: PDF/print checked when applicable
  - type: textarea
    id: impact
    attributes:
      label: Decision impact and reversibility
      description: Describe the commercial/engineering decision affected and whether the change is reversible.
    validations:
      required: true
