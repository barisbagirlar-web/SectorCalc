name: Repair package lock

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-lock:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'chore/engineering-control-plane-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: chore/engineering-control-plane-v1
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Synchronize package lock metadata
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit synchronized package lock
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "PACKAGE_LOCK_ALREADY_SYNCHRONIZED=YES"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "fix: synchronize package lock"
          git push origin HEAD:chore/engineering-control-plane-v1
