name: Industrial Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "fix/*", "release/*"]
  schedule:
    - cron: "37 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: industrial-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  calculation-kernel:
    name: Calculation kernel
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Secret leakage guard
        run: npm run check:secrets

      - name: Runtime stability guard
        run: node scripts/guard-runtime-stability.mjs

      - name: V5.3.1 form architecture
        run: npm run guard:v531-form-architecture

      - name: Forbidden form surfaces
        run: npm run guard:forbidden-form-surfaces

      - name: Schema and formula binding
        run: npm run guard:v531-schema-formula-binding

      - name: PRO runtime registration
        run: npm run guard:baris-v531-runtime-registration

      - name: PRO catalog contract
        run: npm run guard:pro-tools-catalog

      - name: PRO V2 output and isolation contracts
        run: npm run guard:pro-v2-all-extended

      - name: TypeScript gate
        run: npm run typecheck

      - name: ESLint error gate
        run: npm run lint:errors

      - name: Universal Pro form tests
        run: npm run test:v5-form

      - name: Pro runtime tests
        run: npm run test:v5-runtime

      - name: Premium formula audit
        run: npm run audit:premium

      - name: Free tool numeric regression suite
        run: npm run test:golden:free-v531

      - name: Result perspectives golden suite
        run: npx vitest run tests/result-perspectives/result-perspectives-golden.test.ts

      - name: Root-only routing contract
        run: npm run guard:root-only

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sectorcalc.com

  authenticated-pro-runtime:
    name: Authenticated Pro runtime
    needs: calculation-kernel
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      OWNER_BYPASS_EMAIL: barisbagirlar@gmail.com
      E2E_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
      GCLOUD_PROJECT: sectorcalc-bf412
      GOOGLE_CLOUD_PROJECT: sectorcalc-bf412
      FIREBASE_CONFIG: '{"projectId":"sectorcalc-bf412"}'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate isolated E2E credential
        shell: bash
        run: |
          password="$(openssl rand -base64 30 | tr -d '\n')"
          test "${#password}" -ge 20
          echo "::add-mask::$password"
          echo "E2E_OWNER_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Start Firebase emulators
        run: |
          mkdir -p artifacts/break-even-browser-e2e
          npx firebase emulators:start \
            --config firebase.e2e.json \
            --only auth,firestore \
            --project sectorcalc-bf412 \
            > /tmp/sectorcalc-firebase-emulators.log 2>&1 &
          echo $! > /tmp/sectorcalc-firebase-emulators.pid

      - name: Wait for Firebase emulators
        shell: bash
        run: |
          for attempt in $(seq 1 90); do
            if (echo > /dev/tcp/127.0.0.1/9099) 2>/dev/null && \
               (echo > /dev/tcp/127.0.0.1/8080) 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/sectorcalc-firebase-emulators.log
          exit 1

      - name: Seed isolated owner account
        shell: bash
        run: |
          test -n "${E2E_OWNER_PASSWORD:-}"
          response=$(curl --silent --show-error --fail-with-body \
            -X POST \
            "http://127.0.0.1:9099/identitytoolkit.googleapis.com/v1/accounts:signUp?key=sectorcalc-e2e" \
            -H "Content-Type: application/json" \
            --data "{\"email\":\"${OWNER_BYPASS_EMAIL}\",\"password\":\"${E2E_OWNER_PASSWORD}\",\"returnSecureToken\":true}")
          node -e '
            const payload = JSON.parse(process.argv[1]);
            if (!payload.localId || payload.email !== process.env.OWNER_BYPASS_EMAIL) {
              console.error(payload);
              process.exit(1);
            }
            console.log("FIREBASE_E2E_OWNER_SEEDED=PASS");
          ' "$response"

      - name: Production build
        run: npm run build

      - name: Start production server
        run: |
          npm start -- -p 3000 > /tmp/sectorcalc-e2e-server.log 2>&1 &
          echo $! > /tmp/sectorcalc-e2e-server.pid

      - name: Wait for server readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/tools/pro/break-even-survival-cash-calculator > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/sectorcalc-e2e-server.log
          exit 1

      - name: Authenticated form, API, known-answer, and PDF execution
        shell: bash
        run: |
          set -o pipefail
          node scripts/e2e-break-even-browser.mjs 2>&1 | tee artifacts/break-even-browser-e2e/runner.log

      - name: Capture runtime logs
        if: always()
        run: |
          cp /tmp/sectorcalc-e2e-server.log artifacts/break-even-browser-e2e/server.log || true
          cp /tmp/sectorcalc-firebase-emulators.log artifacts/break-even-browser-e2e/firebase-emulators.log || true

      - name: Upload sealed runtime and PDF evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: industrial-auth-pdf-evidence
          path: artifacts/break-even-browser-e2e
          if-no-files-found: error
          retention-days: 7

      - name: Stop production server and emulators
        if: always()
        run: |
          if [ -f /tmp/sectorcalc-e2e-server.pid ]; then
            kill "$(cat /tmp/sectorcalc-e2e-server.pid)" || true
          fi
          if [ -f /tmp/sectorcalc-firebase-emulators.pid ]; then
            kill "$(cat /tmp/sectorcalc-firebase-emulators.pid)" || true
          fi

  pdf-evidence:
    name: Pro PDF evidence
    needs: authenticated-pro-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Download authenticated PDF evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: industrial-auth-pdf-evidence
          path: artifacts/break-even-browser-e2e

      - name: Validate PDF metadata, hashes, layout bounds, and repeatability
        run: node scripts/pdf-industrial-contract.mjs --strict --artifact-dir artifacts/break-even-browser-e2e
