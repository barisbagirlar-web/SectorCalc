name: Industrial Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "37 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: industrial-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  calculation-kernel:
    name: Calculation kernel
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify runtime
        run: |
          node --version
          npm --version
          test -f package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts=false
      - name: Secret leakage guard
        run: npm run check:secrets
      - name: Runtime stability guard
        run: node scripts/guard-runtime-stability.mjs
      - name: TypeScript gate
        run: npm run typecheck
      - name: ESLint error gate
        run: npm run lint:errors
      - name: Universal Pro form tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          npm run test:v5-form -- --reporter=verbose > /tmp/pro-form-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 /tmp/pro-form-tests.log > /tmp/pro-form-tests-tail.log
            echo "::group::Universal Pro form failure diagnostics"
            cat /tmp/pro-form-tests-tail.log
            echo "::endgroup::"
            {
              echo "## Universal Pro form test failure"
              echo
              echo '```text'
              cat /tmp/pro-form-tests-tail.log
              echo '```'
            } > /tmp/pro-form-comment.md
            if [ -n "${PR_NUMBER:-}" ]; then
              gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/pro-form-comment.md
            fi
            exit "$status"
          fi
          cat /tmp/pro-form-tests.log
      - name: Pro runtime tests
        run: npm run test:v5-runtime
      - name: Pro V2 output and isolation contracts
        run: npm run guard:pro-v2-all-extended
      - name: Pro schema and result contracts
        run: |
          npm run guard:pro-tools-catalog
          npm run guard:pro-display-units
          npm run guard:pro-result-render-contract
          npm run guard:pro-no-stale-dom
      - name: Free tool numeric regression suite
        run: npm run test:golden:free-v531
      - name: Production build
        run: npm run build

  authenticated-pro-runtime:
    name: Authenticated Pro runtime
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: calculation-kernel
    env:
      BARIS_E2E_BASE_URL: ${{ vars.BARIS_E2E_BASE_URL || 'https://sectorcalc.com' }}
      BARIS_E2E_TEST_USER_EMAIL: ${{ vars.BARIS_E2E_TEST_USER_EMAIL || 'teb232@gmail.com' }}
      BARIS_E2E_TEST_USER_PASSWORD: ${{ secrets.BARIS_E2E_TEST_USER_PASSWORD }}
      BARIS_E2E_TOOL_KEY: break-even-survival-cash-calculator
      BARIS_E2E_STRICT: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install locked dependencies
        run: npm ci --ignore-scripts=false
      - name: Require approved E2E account
        shell: bash
        run: |
          test "$BARIS_E2E_TEST_USER_EMAIL" = "teb232@gmail.com" || { echo 'Unexpected E2E account'; exit 1; }
          test -n "$BARIS_E2E_TEST_USER_PASSWORD" || { echo 'Missing BARIS_E2E_TEST_USER_PASSWORD'; exit 1; }
      - name: Auth to session to Pro execution
        run: node scripts/integration-auth-session-e2e.mjs --strict

  pdf-evidence:
    name: Pro PDF evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: authenticated-pro-runtime
    env:
      BARIS_PDF_BASE_URL: ${{ vars.BARIS_E2E_BASE_URL || 'https://sectorcalc.com' }}
      BARIS_PDF_TEST_TARGETS: ${{ secrets.BARIS_PDF_TEST_TARGETS }}
      BARIS_E2E_TEST_USER_EMAIL: ${{ vars.BARIS_E2E_TEST_USER_EMAIL || 'teb232@gmail.com' }}
      BARIS_E2E_TEST_USER_PASSWORD: ${{ secrets.BARIS_E2E_TEST_USER_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install locked dependencies
        run: npm ci --ignore-scripts=false
      - name: Install Chromium
        run: ./node_modules/.bin/playwright install --with-deps chromium
      - name: Require PDF test matrix
        shell: bash
        run: |
          test -n "$BARIS_PDF_TEST_TARGETS" || { echo 'Missing BARIS_PDF_TEST_TARGETS'; exit 1; }
      - name: Generate and validate Pro PDFs
        run: node scripts/pdf-industrial-contract.mjs --strict
