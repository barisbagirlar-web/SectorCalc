name: Finalize Break-Even Migration

on:
  push:
    branches:
      - fix/break-even-survival-cash-contract-v531
    paths:
      - scripts/one-time-finalize-break-even-migration.mjs
      - .github/workflows/finalize-break-even-migration.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/break-even-survival-cash-contract-v531
          fetch-depth: 1
          show-progress: false

      - name: Apply verified migration set
        run: |
          set -euo pipefail
          node scripts/one-time-fix-break-even-cross-wire.mjs
          node scripts/one-time-fix-break-even-test-contracts.mjs
          node scripts/one-time-restore-form-state-audit-export.mjs
          node scripts/one-time-harden-v531-form-ux.mjs
          node scripts/one-time-enable-diagnostic-profile.mjs
          node scripts/one-time-finalize-break-even-migration.mjs

      - name: Commit permanent source state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "sectorcalc-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "fix(pro): eliminate break-even cross-tool contamination"
          git push origin HEAD:fix/break-even-survival-cash-contract-v531
