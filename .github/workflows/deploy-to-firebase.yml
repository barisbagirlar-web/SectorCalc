name: Firebase Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  deploy-production:
    name: Firebase production deploy
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    concurrency:
      group: sectorcalc-production-deploy
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NEXT_PUBLIC_SITE_URL: https://sectorcalc.com
      NODE_OPTIONS: --max-old-space-size=8192
      DEPLOY_FORCE_REBUILD: "1"
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY }}
      STRIPE_PRICE_SINGLE_VERDICT: ${{ secrets.STRIPE_PRICE_SINGLE_VERDICT }}
      STRIPE_PRICE_PRO_ANNUAL: ${{ secrets.STRIPE_PRICE_PRO_ANNUAL }}
      STRIPE_PRICE_TEAM: ${{ secrets.STRIPE_PRICE_TEAM }}
      STRIPE_PRICE_CREDITS_1: ${{ secrets.STRIPE_PRICE_CREDITS_1 }}
      STRIPE_PRICE_CREDITS_5: ${{ secrets.STRIPE_PRICE_CREDITS_5 }}
      STRIPE_PRICE_CREDITS_15: ${{ secrets.STRIPE_PRICE_CREDITS_15 }}
      STRIPE_PRICE_CREDITS_30: ${{ secrets.STRIPE_PRICE_CREDITS_30 }}
      STRIPE_PRICE_CREDITS_100: ${{ secrets.STRIPE_PRICE_CREDITS_100 }}
      PUBLIC_SITE_URL: https://sectorcalc.com

    steps:
      - name: Resolve immutable release SHA
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            release_sha="${{ github.event.workflow_run.head_sha }}"
          else
            release_sha="${{ github.sha }}"
          fi
          if ! [[ "$release_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid release SHA: $release_sha"
            exit 1
          fi
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "RELEASE_SHA=$release_sha" >> "$GITHUB_ENV"
          echo "RELEASE_SHA=$release_sha"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.sha }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify checkout and Firebase credential
        shell: bash
        run: |
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$RELEASE_SHA"
          git diff --exit-code
          git diff --cached --exit-code
          if [ -z "${FIREBASE_TOKEN:-}" ]; then
            echo "FIREBASE_TOKEN is not configured. Deployment is blocked."
            exit 1
          fi
          echo "IMMUTABLE_RELEASE_SOURCE=PASS"
          echo "FIREBASE_CREDENTIAL_PRESENT=PASS"

      - name: Wait for all release workflows
        run: node scripts/wait-release-workflows.mjs

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Revalidate critical release contracts
        run: |
          npm run guard:v531-form-architecture
          npm run guard:forbidden-form-surfaces
          npm run guard:v531-schema-formula-binding
          npm run guard:baris-v531-runtime-registration
          npm run guard:pro-tools-catalog
          npx vitest run \
            src/sectorcalc/formulas/pro-v531/__tests__/break-even-survival-cash-calculator.test.ts \
            src/sectorcalc/formulas/pro-v531/__tests__/baris-formula-registry-break-even.test.ts \
            src/sectorcalc/formulas/pro-v531/__tests__/break-even-contract-isolation.test.ts \
            src/sectorcalc/pro-report/__tests__/pro-report-break-even.test.ts \
            src/sectorcalc/pro-runtime/__tests__/decision-engine-formula-status.test.ts

      - name: Stamp immutable release metadata
        shell: bash
        run: |
          mkdir -p public
          node -e '
            const fs = require("fs");
            const payload = {
              sha: process.env.RELEASE_SHA,
              deployedAt: new Date().toISOString(),
              repository: process.env.GITHUB_REPOSITORY,
              workflowRunId: process.env.GITHUB_RUN_ID,
            };
            fs.writeFileSync("public/release.json", JSON.stringify(payload, null, 2) + "\n");
          '
          cat public/release.json

      - name: Write Firebase Functions env file
        shell: bash
        run: |
          mkdir -p functions
          node -e '
          const fs = require("fs");
          const envKeys = [
            "STRIPE_SECRET_KEY","STRIPE_WEBHOOK_SECRET","STRIPE_PRICE_MONTHLY",
            "STRIPE_PRICE_SINGLE_VERDICT","STRIPE_PRICE_PRO_ANNUAL","STRIPE_PRICE_TEAM",
            "STRIPE_PRICE_CREDITS_1","STRIPE_PRICE_CREDITS_5","STRIPE_PRICE_CREDITS_15",
            "STRIPE_PRICE_CREDITS_30","STRIPE_PRICE_CREDITS_100","PUBLIC_SITE_URL"
          ];
          const lines = envKeys.map(k => `${k}=${process.env[k] || ""}`).join("\n");
          fs.writeFileSync("functions/.env", lines + "\n", "utf8");
          '
          echo "functions/.env written ($(wc -c < functions/.env) bytes)"

      - name: Deploy Firebase Hosting, Firestore rules, and SSR function
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p artifacts/production-deploy/collected-logs
          raw_log="$(mktemp /tmp/sectorcalc-firebase-deploy.XXXXXX.log)"

          npm run deploy 2>&1 | tee "$raw_log"
          deploy_status=${PIPESTATUS[0]}
          diagnostics_status=0

          node scripts/redact-deploy-log.mjs \
            "$raw_log" \
            artifacts/production-deploy/firebase-deploy.log || diagnostics_status=$?

          log_index=0
          while IFS= read -r -d '' file; do
            safe_name="$(basename "$file" | tr -c 'A-Za-z0-9._-' '_')"
            destination="artifacts/production-deploy/collected-logs/${log_index}-${safe_name}"
            node scripts/redact-deploy-log.mjs "$file" "$destination" || diagnostics_status=$?
            log_index=$((log_index + 1))
          done < <(
            find . -maxdepth 4 -type f \( \
              -name 'firebase-debug*.log' -o \
              -name '*firebase*.log' -o \
              -name '*deploy*.log' \
            \) \
              -not -path './node_modules/*' \
              -not -path './artifacts/*' \
              -print0
          )

          rm -f "$raw_log"
          {
            echo "FIREBASE_DEPLOY_EXIT_CODE=${deploy_status}"
            echo "DEPLOY_DIAGNOSTICS_EXIT_CODE=${diagnostics_status}"
          } | tee artifacts/production-deploy/result.txt

          if [ "$deploy_status" -ne 0 ]; then
            echo "----- FIREBASE DEPLOY FAILURE TAIL -----"
            tail -n 300 artifacts/production-deploy/firebase-deploy.log || true
            exit "$deploy_status"
          fi

          if [ "$diagnostics_status" -ne 0 ]; then
            echo "Deployment completed, but safe evidence generation failed."
            exit "$diagnostics_status"
          fi

      - name: Upload production deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy-evidence
          path: artifacts/production-deploy
          if-no-files-found: error
          retention-days: 7

      - name: Verify deployed release SHA
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            release_json="$(curl --fail --silent --show-error \
              -H 'Cache-Control: no-cache' \
              "https://sectorcalc.com/release.json?release=${RELEASE_SHA}&attempt=${attempt}" || true)"
            deployed_sha="$(printf '%s' "$release_json" | node -e '
              const fs = require("fs");
              try {
                const payload = JSON.parse(fs.readFileSync(0, "utf8"));
                process.stdout.write(typeof payload.sha === "string" ? payload.sha : "");
              } catch {}
            ')"
            if [ "$deployed_sha" = "$RELEASE_SHA" ]; then
              echo "DEPLOYMENT_SHA_MATCH=PASS"
              exit 0
            fi
            sleep 10
          done
          echo "Deployment SHA did not converge to $RELEASE_SHA"
          exit 1

      - name: Verify live engine health and known-answer gate
        shell: bash
        run: |
          health_file="$(mktemp)"
          curl --fail --silent --show-error \
            -H 'Cache-Control: no-cache' \
            "https://sectorcalc.com/api/release-health?release=${RELEASE_SHA}" \
            -o "$health_file"
          cat "$health_file"
          node - "$health_file" <<'NODE'
          const fs = require("fs");
          const payload = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          const critical = payload?.criticalChecks?.breakEvenSurvivalCash;
          const formula = payload?.proFormulaExecution;
          const pass =
            payload?.status === "ok" &&
            critical?.status === "PASS" &&
            critical?.modulePresent === true &&
            critical?.outputNamespace === true &&
            critical?.knownAnswer === true &&
            critical?.decision === true &&
            formula?.lastSmoke === "PASS" &&
            formula?.missingModules === "NONE" &&
            formula?.blockedTools === "NONE" &&
            formula?.passThroughCount === 0;
          if (!pass) {
            console.error("LIVE_RELEASE_HEALTH=FAIL", payload);
            process.exit(1);
          }
          console.log("LIVE_RELEASE_HEALTH=PASS");
          NODE

      - name: Verify live calculator route
        shell: bash
        run: |
          page_file="$(mktemp)"
          status="$(curl --silent --show-error \
            -H 'Cache-Control: no-cache' \
            -o "$page_file" \
            -w '%{http_code}' \
            "https://sectorcalc.com/tools/pro/break-even-survival-cash-calculator?release=${RELEASE_SHA}")"
          test "$status" = "200"
          grep -Fq "Break-Even &amp; Survival Cash Calculator" "$page_file" || \
            grep -Fq "Break-Even & Survival Cash Calculator" "$page_file"
          if grep -Eq "Initial Investment|Annual Net Cash Flow|Discount Rate|Residual Value" "$page_file"; then
            echo "CROSS_TOOL_INPUT_CONTAMINATION=FAIL"
            exit 1
          fi
          echo "LIVE_CALCULATOR_ROUTE=PASS"

# workflow_dispatch cache refresh
# force cache refresh
