# SectorCalc — Mathematical Verification Gate
# C-XSC compatible interval arithmetic + MMS CI/CD pipeline
#
# Fails the build if:
#   - Interval width exceeds tolerance for any MMS test case
#   - Hypothesis property tests discover a counterexample
#   - API contract (lower_bound/upper_bound required) is violated
#
# Deployment block: if this job fails, deployment MUST NOT proceed.

name: Mathematical Verification Gate

on:
  push:
    branches: [main]
    paths:
      - "math-kernel/**"
      - ".github/workflows/math_verification.yml"
  pull_request:
    branches: [main]
    paths:
      - "math-kernel/**"
      - ".github/workflows/math_verification.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: math-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"                       # Hypothesis deterministic profile (Phase.explicit + Phase.reuse only)
  MATH_STRICT_MODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  interval-arithmetic-gate:
    name: Interval Arithmetic + MMS Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python 3.11
        uses: actions/setup-python@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: math-kernel/requirements.txt

      - name: Install rigorous math dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r math-kernel/requirements.txt
          pip freeze | grep -E "sympy|mpmath|fastapi|pydantic|hypothesis|pytest"

      - name: Generate MMS test suite
        run: |
          cd math-kernel
          python -c "
from mms_generator import MmsSuiteGenerator, export_suite_to_json
suite = MmsSuiteGenerator.generate_suite()
path = export_suite_to_json('mms_suite.json')
print(f'MMS Suite generated: {path}')
print(f'  Total cases: {len(suite)}')
categories = set(tc.category for tc in suite)
print(f'  Categories: {categories}')
for tc in suite:
    has_exact = 'EXACT' if tc.exact_analytical_result is not None else 'SELF-CONSISTENCY'
    print(f'    [{tc.category:6s}] {tc.name:45s} {has_exact}  tol={tc.tolerance:.0e}')
"
          cat mms_suite.json | python -m json.tool | head -10

      - name: Run interval arithmetic pytest with strict bounds
        run: |
          cd math-kernel
          python -m pytest tests/ \
            --verbose \
            --tb=short \
            --strict-bounds \
            --timeout=60 \
            -x \
            --junitxml=test-results.xml \
            -k "not test_api" 2>&1 | tee pytest-output.log

      - name: Run API contract tests
        run: |
          cd math-kernel
          python -m pytest tests/test_api.py \
            --verbose \
            --tb=short \
            -x \
            --junitxml=api-test-results.xml 2>&1 | tee api-pytest-output.log

      - name: Run Hypothesis property-based tests
        run: |
          cd math-kernel
          python -m pytest tests/test_interval_engine.py::TestHypothesisProperties \
            --verbose \
            --tb=long \
            --hypothesis-show-statistics \
            -x \
            --junitxml=hypothesis-results.xml 2>&1 | tee hypothesis-output.log

      - name: Verify MMS suite passes all core tests
        run: |
          cd math-kernel
          python -c "
import json, sys
with open('mms_suite.json') as f:
    suite = json.load(f)
print(f'Suite version: {suite[\"version\"]}')
print(f'Total cases: {suite[\"total_cases\"]}')

# Verify each case has required fields
required = {'name', 'description', 'inputs', 'exact_analytical_result', 'tolerance',
            'analytical_formula', 'category'}
for case in suite['cases']:
    missing = required - set(case.keys())
    if missing:
        print(f'FAIL: Case \"{case[\"name\"]}\" missing: {missing}')
        sys.exit(1)

# Verify core cases have exact analytical results
for case in suite['cases']:
    if case['category'] == 'core' and case['exact_analytical_result'] is None:
        print(f'FAIL: Core case \"{case[\"name\"]}\" missing exact_analytical_result')
        sys.exit(1)

print('ALL MMS SUITE CHECKS PASSED')
"
      - name: Block deployment on interval breach
        if: failure()
        run: |
          echo "======================================================"
          echo "MATEMATİKSEL ARALIK İHLALİ. DEPLOYMENT DURDURULDU."
          echo "Mathematical interval breach detected. Deployment blocked."
          echo "======================================================"
          echo ""
          echo "=== pytest output ==="
          if [ -f pytest-output.log ]; then cat pytest-output.log; fi
          if [ -f hypothesis-output.log ]; then cat hypothesis-output.log; fi
          if [ -f api-pytest-output.log ]; then cat api-pytest-output.log; fi
          exit 1

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: math-kernel-test-results
          path: |
            math-kernel/test-results.xml
            math-kernel/api-test-results.xml
            math-kernel/hypothesis-results.xml
            math-kernel/mms_suite.json
            math-kernel/pytest-output.log
            math-kernel/hypothesis-output.log
            math-kernel/api-pytest-output.log
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Mathematical Verification Gate Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Interval arithmetic engine verified" >> $GITHUB_STEP_SUMMARY
          echo "- MMS suite generated and validated" >> $GITHUB_STEP_SUMMARY
          echo "- Hypothesis property tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- API contract (lower_bound/upper_bound) validated" >> $GITHUB_STEP_SUMMARY
