name: Workflow Security

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "zizmor.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "zizmor.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor workflow audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          persona: pedantic
          min-severity: medium
          min-confidence: medium
          online-audits: true
          inputs: |
            .github/workflows
            .github/actions
