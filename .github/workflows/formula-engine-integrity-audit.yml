name: Formula Engine Integrity Audit

on:
  pull_request:
    paths:
      - "src/sectorcalc/schemas/**"
      - "src/sectorcalc/formulas/**"
      - "src/sectorcalc/runtime/**"
      - "src/sectorcalc/pro-form/**"
      - "src/sectorcalc/pro-runtime/**"
      - "tests/free-tools/**"
      - "tests/pro-v2/**"
      - "tests/golden/**"
      - "scripts/audit-tool-formula-integrity.mjs"
      - ".github/workflows/formula-engine-integrity-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  formula-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run complete formula integrity suite
        shell: bash
        run: |
          set +e
          failed=0
          run_check() {
            name="$1"
            shift
            echo "::group::$name"
            "$@"
            code=$?
            echo "::endgroup::"
            if [ "$code" -ne 0 ]; then
              echo "::error title=$name failed::exit code $code"
              failed=1
            fi
          }

          run_check "Static schema/formula/input audit" node scripts/audit-tool-formula-integrity.mjs
          run_check "Schema/formula binding" npm run guard:v531-schema-formula-binding
          run_check "Free schema contract" node scripts/guard-free-schema-contract.mjs
          run_check "Free formula contract" node scripts/guard-free-formula-contract.mjs
          run_check "Free units and currency" node scripts/guard-free-units-and-currency.mjs
          run_check "Free public copy quality" node scripts/guard-free-public-copy-quality.mjs
          run_check "Free form render contract" node scripts/guard-free-form-render-contract.mjs
          run_check "Free catalog integrity" node scripts/guard-free-catalog-integrity.mjs
          run_check "Free result panel" node scripts/guard-free-result-panel.mjs
          run_check "Free execution smoke" node scripts/smoke-free-tools-execution.mjs
          run_check "Free mobile UX smoke" node scripts/smoke-free-tools-mobile-ux.mjs
          run_check "Free tool tests" npx vitest run tests/free-tools/
          run_check "Universal result perspectives" node scripts/guard-universal-result-perspectives.mjs
          run_check "Premium formula audit" npm run audit:premium
          run_check "Free golden mathematical tests" npm run test:golden:free-v531
          run_check "Pro runtime tests" npm run test:v5-runtime
          run_check "Typecheck" npm run typecheck

          exit "$failed"
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formula-engine-integrity-audit
          path: artifacts/formula-integrity-audit/
          if-no-files-found: warn
          retention-days: 14
