# SEO Quality Gates
#
# Pull requests and source pushes validate a locally generated sitemap against
# the same route manifest. Live HTTP/canonical checks run separately on schedule
# or manual dispatch, after deployment can exist.

name: SEO Quality Gates

on:
  push:
    branches: [main, feature/*, release/*]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  local-seo-quality-gates:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Local SEO Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://sectorcalc.com
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate route manifest
        run: npx tsx scripts/dump-routes-to-json.ts

      - name: Generate local sitemap from canonical manifest
        run: npx tsx scripts/generate-ci-sitemap.ts public/sitemap-ci.xml

      - name: Verify generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -s public/routes.json
          test -s public/sitemap-ci.xml
          ROUTE_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/routes.json','utf8')).length)")
          SITEMAP_COUNT=$(grep -c '<url>' public/sitemap-ci.xml)
          echo "ROUTE_COUNT=$ROUTE_COUNT"
          echo "SITEMAP_COUNT=$SITEMAP_COUNT"
          test "$ROUTE_COUNT" -ge 10
          test "$ROUTE_COUNT" -eq "$SITEMAP_COUNT"

      - name: Validate exact local sitemap parity
        run: >-
          node scripts/sitemap-lock.mjs
          --local public/sitemap-ci.xml
          --routes public/routes.json
          --sample 0

      - name: SEO copy lint gate
        run: npx tsx scripts/lint-seo.ts --all

  live-sitemap-observability:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Live Sitemap Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://sectorcalc.com
      NODE_OPTIONS: --max-old-space-size=2048

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate deployed sitemap and canonical URLs
        run: >-
          node scripts/sitemap-lock.mjs
          --sitemap https://sectorcalc.com/sitemap.xml
          --sample 50
