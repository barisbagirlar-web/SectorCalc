# SEO Quality Gates — CI Workflow
#
# Runs after production build to validate sitemap integrity and SEO copy quality.
# Gate failures block deploy. Part of the fable_dedektif audit system.

name: SEO Quality Gates

on:
  push:
    branches: [main, feature/*, release/*]
  pull_request:
    branches: [main]

jobs:
  seo-quality-gates:
    name: SEO Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SITE_URL: https://sectorcalc.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Dump build routes to JSON manifest
        run: npx tsx scripts/dump-routes-to-json.ts
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify routes manifest was written
        run: |
          if [ ! -f public/routes.json ]; then
            echo "FAIL: public/routes.json was not created by dump-routes-to-json.ts"
            exit 1
          fi
          ROUTE_COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('public/routes.json','utf-8')).length)")
          echo "Routes in manifest: $ROUTE_COUNT"
          if [ "$ROUTE_COUNT" -lt 10 ]; then
            echo "FAIL: routes.json has < 10 routes — build manifest likely broken"
            exit 1
          fi

      - name: Run sitemap lock (full gate including route parity)
        run: node scripts/sitemap-lock.mjs --routes public/routes.json --sample 50
        env:
          NODE_OPTIONS: --max-old-space-size=2048

      - name: SEO copy lint gate (all SeoMeta entries)
        run: npx tsx scripts/lint-seo.ts --all
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=2048

      - name: Notify on gate failure
        if: failure()
        run: |
          echo "::warning::SEO Quality Gate FAILED — inspect sitemap-lock output above"
          echo "::warning::Common causes: new tool without sitemap entry, missing lastmod, data files in sitemap"
