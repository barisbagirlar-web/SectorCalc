name: SEO Quality Gates

on:
  push:
    branches: [main, "feature/*", "fix/*", "release/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: seo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seo-quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://sectorcalc.com

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build branch route manifest
        run: npx tsx scripts/dump-routes-to-json.ts
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Validate branch route manifest
        run: node scripts/guard-route-manifest.mjs public/routes.json

      - name: Root-only routing contract
        run: npm run guard:root-only

      - name: SEO copy lint
        run: npx tsx scripts/lint-seo.ts --all
        env:
          NODE_OPTIONS: --max-old-space-size=2048
