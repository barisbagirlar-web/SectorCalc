name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  industrial-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ── Industrial Pipeline: Stages 0-7 ──
      # Stage 0: Schema Lock
      - name: "Stage 0 — Schema Lock (Industrial — blocks QUARANTINE+WARN)"
        run: npm run steelcore:validate:industrial
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Stage 1: Generation (Isolated) + Quarantine Snapshot
      - name: "Stage 1 — The Factory (Generation)"
        run: npm run generate:all
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NODE_OPTIONS: --max-old-space-size=4096

      - name: "Stage 1 — Quarantine Snapshot"
        run: node scripts/steelcore/quarantine-snapshot.mjs

      # Stage 2: Static Quality Gate
      - name: "Stage 2.1 — TypeScript Grammar"
        run: npx tsc --noEmit

      - name: "Stage 2.2 — Code Style & Safety (zero warnings)"
        run: npm run lint:strict

      - name: "Stage 2.3 — Linguistic Completeness (+missing key detection)"
        run: npm run i18n:check

      # Stage 3: Semantic & Mathematical Validation
      - name: "Stage 3.1 — Compiler Integrity (+runtime execution)"
        run: npm run audit:formula-compile

      - name: "Stage 3.2 — Boundary Enforcement (Known-Answer Vectors)"
        run: npm run steelcore:enforce-boundaries

      - name: "Stage 3.3 — Cross-Domain Contamination (enforce blocking)"
        run: npm run steelcore:ci-gate:enforce
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Stage 4: Runtime Trust Engine (Fuzz)
      - name: "Stage 4 — Compliance Audit"
        run: npm run audit:runtime-trust-engine -- --fuzz=10000
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: "Stage 4 — Real Fuzz Test (10k garbage injections)"
        run: npm run steelcore:fuzz -- --fuzz=10000
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Stage 5: System Integration & Build
      - name: "Stage 5 — Production Build"
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_SITE_URL: https://www.sectorcalc.com

      - name: "Stage 5.1 — Sitemap"
        run: npm run generate:sitemap-static

      - name: Validate build
        run: node scripts/validate-next-build.mjs

      - name: Finalize build (Firebase export stubs)
        run: node scripts/finalize-next-build.mjs

      # Stage 6: Smoke & Health
      - name: "Stage 6.1 — Browser Routes"
        run: npm run smoke:browser-routes

      - name: "Stage 6.2 — All Calculation Forms"
        run: npm run smoke:all-calculation-forms

      # Stage 7: Final Sign-Off
      - name: "Stage 7.1 — Formula Health Report"
        run: npm run formula:health

      - name: "Stage 7.2 — Production Readiness"
        run: npm run audit:production-readiness

      - name: "Stage 7.3 — Release Gate"
        run: npm run release:gate

      # ── Deploy ──
      - name: Sync translations (Lokalise)
        run: npm run i18n:sync
        continue-on-error: true
        env:
          LOKALISE_TOKEN: ${{ secrets.LOKALISE_TOKEN }}
          LOKALISE_PROJECT_ID: ${{ secrets.LOKALISE_PROJECT_ID }}
          NODE_OPTIONS: --max-old-space-size=2048

      - name: i18n hardcoded-text audit
        run: node scripts/audit-i18n-hardcoded.mjs

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting + Firestore rules
        run: |
          firebase deploy \
            --only hosting,firestore:rules \
            --project sectorcalc-bf412 \
            --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          FIREBASE_FRAMEWORKS_BUILD_TARGET: production
          SECTORCALC_FIREBASE_REUSE_BUILD: "1"
