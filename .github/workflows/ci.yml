name: CI

on:
  push:
    branches: [main, "feature/*", "fix/*", "release/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  industrial-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: V5.3.1 form architecture
        run: npm run guard:v531-form-architecture

      - name: Forbidden form surfaces
        run: npm run guard:forbidden-form-surfaces

      - name: Schema and formula binding
        run: npm run guard:v531-schema-formula-binding

      - name: PRO runtime registration
        run: npm run guard:baris-v531-runtime-registration

      - name: PRO catalog contract
        run: npm run guard:pro-tools-catalog

      - name: PRO V2 extended contract matrix
        run: npm run guard:pro-v2-all-extended
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint errors
        run: npm run lint:errors

      - name: V5 form tests
        run: npm run test:v5-form
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: V5 runtime tests
        run: npm run test:v5-runtime
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Premium formula audit
        run: npm run audit:premium
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Root-only routing guard
        run: npm run guard:root-only

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_SITE_URL: https://sectorcalc.com

      - name: PRO real-execution smoke
        run: npm run smoke:v531-pro-real-execution
        env:
          NODE_OPTIONS: --max-old-space-size=6144
