name: CI

on:
  push:
    branches: [main, "feature/*", "fix/*", "release/*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      firestore_indexes_only: ${{ steps.scope.outputs.firestore_indexes_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: scope
        name: Detect index-only pull request
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "firestore_indexes_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}"
          mapfile -t changed_files < <(
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" | sed '/^$/d'
          )

          printf 'Changed files:\n'
          printf ' - %s\n' "${changed_files[@]}"

          if [ "${#changed_files[@]}" -eq 1 ] && [ "${changed_files[0]}" = "firestore.indexes.json" ]; then
            echo "firestore_indexes_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "firestore_indexes_only=false" >> "$GITHUB_OUTPUT"
          fi

  firestore-index-contract:
    needs: detect-scope
    if: ${{ needs.detect-scope.outputs.firestore_indexes_only == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Firestore index contract
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'firestore.indexes.json';
          const parsed = JSON.parse(fs.readFileSync(path, 'utf8'));

          if (!Array.isArray(parsed.indexes)) {
            throw new Error('firestore.indexes.json: indexes must be an array');
          }
          if (!Array.isArray(parsed.fieldOverrides)) {
            throw new Error('firestore.indexes.json: fieldOverrides must be an array');
          }

          for (const [index, definition] of parsed.indexes.entries()) {
            if (!definition || typeof definition !== 'object') {
              throw new Error(`Index ${index} must be an object`);
            }
            if (typeof definition.collectionGroup !== 'string' || !definition.collectionGroup) {
              throw new Error(`Index ${index} has no collectionGroup`);
            }
            if (!Array.isArray(definition.fields) || definition.fields.length < 2) {
              throw new Error(
                `Index ${index} (${definition.collectionGroup}) is a redundant single-field composite index`,
              );
            }
            for (const field of definition.fields) {
              if (typeof field.fieldPath !== 'string' || !field.fieldPath) {
                throw new Error(`Index ${index} has an invalid fieldPath`);
              }
              const modeCount = ['order', 'arrayConfig', 'vectorConfig']
                .filter((key) => field[key] !== undefined).length;
              if (modeCount !== 1) {
                throw new Error(`Index ${index}/${field.fieldPath} must define exactly one index mode`);
              }
            }
          }

          console.log('FIRESTORE_INDEX_CONTRACT=PASS');
          NODE

  industrial-pipeline:
    needs: detect-scope
    if: ${{ needs.detect-scope.outputs.firestore_indexes_only != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Release automation syntax and redaction
        shell: bash
        run: |
          node --check scripts/wait-release-workflows.mjs
          node --check scripts/deploy-production.mjs
          node --check scripts/e2e-break-even-browser.mjs
          node --check scripts/redact-deploy-log.mjs

          source_log="$(mktemp)"
          redacted_log="$(mktemp)"
          test_secret="SectorCalc-Test-Secret-2026"
          {
            echo "Authorization: Bearer ${test_secret}"
            echo "FIREBASE_TOKEN=${test_secret}"
            echo "{\"access_token\":\"${test_secret}\"}"
          } > "$source_log"
          FIREBASE_TOKEN="$test_secret" node scripts/redact-deploy-log.mjs "$source_log" "$redacted_log"
          if grep -Fq "$test_secret" "$redacted_log"; then
            echo "DEPLOY_LOG_REDACTION=FAIL"
            exit 1
          fi
          grep -Fq "[REDACTED]" "$redacted_log"
          rm -f "$source_log" "$redacted_log"
          echo "DEPLOY_LOG_REDACTION_SMOKE=PASS"

      - name: V5.3.1 form architecture
        run: npm run guard:v531-form-architecture

      - name: Forbidden form surfaces
        run: npm run guard:forbidden-form-surfaces

      - name: Schema and formula binding
        run: npm run guard:v531-schema-formula-binding

      - name: PRO runtime registration
        run: npm run guard:baris-v531-runtime-registration

      - name: PRO catalog contract
        run: npm run guard:pro-tools-catalog

      - name: PRO V2 extended contract matrix
        run: npm run guard:pro-v2-all-extended
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint errors
        run: npm run lint:errors

      - name: V5 form tests
        run: npm run test:v5-form
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: V5 runtime tests
        run: npm run test:v5-runtime
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Premium formula audit
        run: npm run audit:premium
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Root-only routing guard
        run: npm run guard:root-only

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_SITE_URL: https://sectorcalc.com

      - name: PRO formula execution gate
        run: >-
          npx vitest run
          src/sectorcalc/formulas/pro-v531/__tests__/break-even-survival-cash-calculator.test.ts
          src/sectorcalc/formulas/pro-v531/__tests__/baris-formula-registry-break-even.test.ts
          src/sectorcalc/formulas/pro-v531/__tests__/break-even-contract-isolation.test.ts
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: PRO formula health gate
        run: >-
          npx vitest run
          src/sectorcalc/formulas/pro-v531/__tests__/formula-schema-contract.test.ts
          src/sectorcalc/pro-report/__tests__/pro-report-break-even.test.ts
          src/sectorcalc/pro-runtime/__tests__/decision-engine-formula-status.test.ts
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  canonical-quality-gate:
    name: Canonical quality gate
    needs: [detect-scope, firestore-index-contract, industrial-pipeline]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce canonical pipeline result
        shell: bash
        run: |
          set -euo pipefail

          scope_result="${{ needs.detect-scope.result }}"
          index_only="${{ needs.detect-scope.outputs.firestore_indexes_only }}"
          index_result="${{ needs.firestore-index-contract.result }}"
          industrial_result="${{ needs.industrial-pipeline.result }}"

          if [ "$scope_result" != "success" ]; then
            echo "CANONICAL_QUALITY_GATE=FAIL scope detection failed"
            exit 1
          fi

          if [ "$index_only" = "true" ]; then
            if [ "$index_result" != "success" ]; then
              echo "CANONICAL_QUALITY_GATE=FAIL Firestore index contract failed"
              exit 1
            fi
            if [ "$industrial_result" != "skipped" ]; then
              echo "CANONICAL_QUALITY_GATE=FAIL industrial pipeline unexpectedly ran"
              exit 1
            fi
          else
            if [ "$industrial_result" != "success" ]; then
              echo "CANONICAL_QUALITY_GATE=FAIL industrial pipeline failed"
              exit 1
            fi
          fi

          echo "CANONICAL_QUALITY_GATE=PASS"
