name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  canonical-quality-gate:
    name: Canonical quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts=false

      - name: Secret leakage guard
        run: npm run check:secrets

      - name: Runtime stability guard
        run: node scripts/guard-runtime-stability.mjs

      - name: TypeScript gate
        run: npm run typecheck

      - name: ESLint error gate
        run: npm run lint:errors

      - name: Pro form tests
        run: npm run test:v5-form

      - name: Pro runtime tests
        run: npm run test:v5-runtime

      - name: Pro output and isolation contracts
        run: npm run guard:pro-v2-all-extended

      - name: Pro schema and result contracts
        run: |
          npm run guard:pro-tools-catalog
          npm run guard:pro-display-units
          npm run guard:pro-result-render-contract
          npm run guard:pro-no-stale-dom

      - name: Free tool numeric regression suite
        run: npm run test:golden:free-v531

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sectorcalc.com
