name: Sentinel Ultimate Canary
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
concurrency:
  group: sectorcalc-sentinel-canary
  cancel-in-progress: true
jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20, cache: npm, cache-dependency-path: tools/sectorcalc-sentinel-ultimate/package-lock.json}
      - run: npm ci
        working-directory: tools/sectorcalc-sentinel-ultimate
      - run: npx playwright install --with-deps chromium
        working-directory: tools/sectorcalc-sentinel-ultimate
      - name: Restore owner state
        env: {OWNER: "${{ secrets.SENTINEL_OWNER_STORAGE_STATE }}"}
        run: |
          test -n "$OWNER" || { echo 'Missing owner state'; exit 1; }
          mkdir -p .sentinel/auth
          printf '%s' "$OWNER" > .sentinel/auth/owner.json
      - name: Low-volume rotating production canary
        env: {SECTORCALC_SENTINEL_CONFIG: sentinel.config.yaml}
        run: node tools/sectorcalc-sentinel-ultimate/src/cli.mjs canary
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sentinel-canary-evidence
          path: reports/sectorcalc-sentinel-ultimate/
