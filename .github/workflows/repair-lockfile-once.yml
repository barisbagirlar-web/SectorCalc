name: Repair Lockfile Once

on:
  push:
    branches:
      - fix/break-even-survival-cash-contract-v531
    paths:
      - .github/workflows/repair-lockfile-once.yml

permissions:
  contents: write

jobs:
  repair-lockfile:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/break-even-survival-cash-contract-v531
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: npm

      - name: Regenerate deterministic lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Prove clean installation
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Remove one-time workflow and commit lockfile
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/repair-lockfile-once.yml
          git config user.name "sectorcalc-ci"
          git config user.email "actions@users.noreply.github.com"
          git add package-lock.json .github/workflows/repair-lockfile-once.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: synchronize package lock with Next 15.5.20"
          git push origin HEAD:fix/break-even-survival-cash-contract-v531
