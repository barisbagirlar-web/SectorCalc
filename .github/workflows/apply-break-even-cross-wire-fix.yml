name: Apply Break-Even Cross-Wire Fix

on:
  push:
    branches:
      - fix/break-even-survival-cash-contract-v531
    paths:
      - scripts/one-time-fix-break-even-cross-wire.mjs
      - .github/workflows/apply-break-even-cross-wire-fix.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/break-even-survival-cash-contract-v531
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply exact cross-wire migration
        run: node scripts/one-time-fix-break-even-cross-wire.mjs

      - name: Verify PRO V2 contracts
        run: npm run guard:pro-v2-all-extended

      - name: Verify targeted break-even contracts
        run: >-
          npx vitest run
          src/sectorcalc/formulas/pro-v531/__tests__/break-even-survival-cash-calculator.test.ts
          src/sectorcalc/formulas/pro-v531/__tests__/baris-formula-registry-break-even.test.ts
          src/sectorcalc/formulas/pro-v531/__tests__/break-even-contract-isolation.test.ts
          src/sectorcalc/pro-form/__tests__/form-state-machine-unit-init.test.ts
          src/sectorcalc/pro-report/__tests__/pro-report-break-even.test.ts
          src/sectorcalc/pro-runtime/__tests__/decision-engine-formula-status.test.ts

      - name: Verify TypeScript
        run: npm run typecheck

      - name: Verify lint errors
        run: npm run lint:errors

      - name: Commit verified migration and remove one-time files
        shell: bash
        run: |
          set -euo pipefail
          rm scripts/one-time-fix-break-even-cross-wire.mjs
          rm .github/workflows/apply-break-even-cross-wire-fix.yml
          git config user.name "sectorcalc-ci"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "fix(pro): eliminate break-even cross-tool contamination"
          git push origin HEAD:fix/break-even-survival-cash-contract-v531
