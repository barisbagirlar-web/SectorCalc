name: Exact Decimal Handoff Validation

on:
  pull_request:
    branches:
      - integration/exact-decimal-validation
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exact-decimal-handoff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      CI: "true"
      MATH_STRICT_MODE: "1"
      NODE_OPTIONS: --max-old-space-size=8192
      NEXT_PUBLIC_SITE_URL: https://sectorcalc.com
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: math-kernel/requirements.txt

      - name: Install locked Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Install math-kernel dependencies
        run: python -m pip install -r math-kernel/requirements.txt

      - name: Secret leakage guard
        run: npm run check:secrets

      - name: TypeScript gate
        run: npm run typecheck

      - name: Architecture and regression tests
        run: >-
          npx vitest run
          src/sectorcalc/pro-form/__tests__/
          src/sectorcalc/runtime/__tests__/v531-architecture.test.ts
          tests/pro-v2/form-api-formula-pipeline.test.ts
          tests/pro-v2/tool-specific-report-isolation.test.ts
          tests/pro-v531-baris/productization.test.ts
          tests/pro-v531-baris/entitlement-guard.test.ts
          tests/pro-v531-live-execution/

      - name: Exact Decimal property suites
        run: >-
          npx vitest run
          tests/pro-calculation-correctness/
          tests/free-tools/certified-free-tools.property.test.ts
          tests/free-tools/certified-free-interval-client.test.ts

      - name: Certification and runtime guards
        run: |
          npm run guard:active-tools
          npm run audit:runtime
          npm run test:golden:free-v531
          npm run guard:pro-v2-all-extended

      - name: Python interval and Hypothesis strict-bounds suite
        run: |
          cd math-kernel
          python -m pytest tests/ --verbose --tb=short --strict-bounds -x

      - name: Production build
        run: npm run build
