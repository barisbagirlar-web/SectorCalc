<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 120 120"
  width="120"
  height="120"
  role="img"
  aria-labelledby="sectorcalcLogoT"
>
  <title id="sectorcalcLogoT">SectorCalc Symbol Logo</title>
  <g fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round">
    <!-- Center vertical spine -->
    <line x1="60" y1="35" x2="60" y2="85" />
    <!-- Top horizontal bracket -->
    <line x1="50" y1="35" x2="60" y2="35" />
    <!-- Left dash -->
    <line x1="25" y1="60" x2="45" y2="60" />
    <!-- Right dash -->
    <line x1="75" y1="60" x2="95" y2="60" />
    <!-- Bottom horizontal -->
    <line x1="50" y1="85" x2="70" y2="85" />
  </g>
</svg>
