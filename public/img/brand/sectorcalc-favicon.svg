<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  width="512"
  height="512"
  role="img"
  aria-labelledby="faviconTitle"
>
  <title id="faviconTitle">SectorCalc</title>

  <defs>
    <linearGradient id="faviconBgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#0F3460" />
    </linearGradient>
    <linearGradient id="faviconMarkGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="50%" stop-color="#F7C59F" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>

  <!-- Rounded square background ? premium container -->
  <rect x="8" y="8" width="496" height="496" rx="96" fill="url(#faviconBgGrad)" />

  <!-- SectorCalc brand S-mark ? bold stroke variant for favicon clarity -->
  <g fill="none" stroke="url(#faviconMarkGrad)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left horizontal bar (top area) ? thickened from 20?52 -->
    <rect x="112" y="210" width="58" height="52" rx="10" stroke-width="32" />
    <!-- Right horizontal bar (top area) ? thickened from 20?52 -->
    <rect x="342" y="210" width="58" height="52" rx="10" stroke-width="32" />
    <!-- S-curve vertical body ? thickened -->
    <path d="M256 96H184V308H256V160H328" stroke-width="56" />
    <!-- Bottom horizontal beam ? thickened from 20?52 -->
    <rect x="180" y="368" width="152" height="52" rx="10" stroke-width="32" />
  </g>
</svg>
