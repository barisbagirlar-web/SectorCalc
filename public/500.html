<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>500 — Server Error | SectorCalc</title>
  <meta name="robots" content="noindex, nofollow"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #E8E6DE;
      color: #1A1915;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #F0EEE6;
      border: 1px solid rgba(26,25,21,0.08);
      border-radius: 16px;
      padding: 48px;
      max-width: 520px;
      text-align: center;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; line-height: 1.6; color: rgba(26,25,21,0.7); margin-bottom: 24px; }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: #BD5D3A;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.15s;
    }
    a:hover { background: #a04d2f; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Something went wrong</h1>
    <p>Our server encountered an unexpected error. The engineering team has been notified. Please try again shortly.</p>
    <a href="/">Return to SectorCalc</a>
  </div>
</body>
</html>
